<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page!</title>
    <link rel="stylesheet" href="./scss/registerpage.css">
</head>
<body>
 
  <h2>რეგისტრაცია</h2>

<a href="index.html">
  <button id="home" type="button" style="display:none;" >მთავარი გვერდი</button>
</a>

<form id="registerForm">

<!-- სახელი -->
<label>სახელი</label>
<input type="text" id="firstNameInput" placeholder="მაგ: გიორგი">

<!-- გვარი -->
<label>გვარი</label>
<input type="text" id="lastNameInput" placeholder="მაგ: მამულაშვილი">

<!-- ასაკი -->
<label>ასაკი</label>
<input type="number" id="ageInput" placeholder="18">

<!-- ელ-ფოსტა -->
<label>ელ-ფოსტა</label>
<input type="email" id="emailInput" placeholder="უნდა შეიცავდეს @">


<!-- პაროლი -->
<label>პაროლი</label>
<input type="password" id="passwordInput" placeholder="პაროლი უნდა იყოს მინიმუმ 8 სიმბოლო">

<!-- გაიმეორე პაროლი -->
<label>გაიმეორე პაროლი</label>
<input type="password" id="confirmInput" placeholder="გაიმეორე პაროლი">

<!-- მისამართი -->
<label>მისამართი</label>
<input type="text" id="addressInput" placeholder="თბილისი">

<!-- ტელეფონი -->
<label>ტელეფონი</label>
<input type="text" id="phoneInput" placeholder="+995 აუცილებლად ქართული!">

<!-- Zip Code -->
<label>Zip Code</label>
<input type="text" id="zipcodeInput" placeholder="1423">

<!-- Avatar -->
<label>Avatar URL</label>
<input
  type="text"
  id="avatarInput"
  value="https://i.pravatar.cc/300"
/>


<!-- Gender -->
<label>სქესი</label>
<select id="genderInput">
  <option value="MALE">კაცი</option>
  <option value="FEMALE">ქალი</option>
</select>

<button id="submitButton" type="submit">
  რეგისტრაცია
</button>

<p id="successMsg" style="display:none;">
  რეგისტრაცია წარმატებით დასრულდა!
</p>

</form>
     
   <script src="./js/register.js"></script>
</body>
</html>
